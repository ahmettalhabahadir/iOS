name: Build iOS App (Simulator & Physical Device)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Disable Swift Package Manager (CocoaPods-only build)
        run: flutter config --no-enable-swift-package-manager

      - name: Get Dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS Simulator App
        run: flutter build ios --simulator --no-codesign

      - name: Zip Runner.app (Simulator)
        run: |
          cd build/ios/iphonesimulator
          zip -r Runner.app.zip Runner.app

      - name: Upload iOS Simulator App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/ios/iphonesimulator/Runner.app.zip

      - name: Build iOS Physical Device App
        run: flutter build ios --no-codesign

      - name: Create Runner.ipa for Physical iPhone
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r Runner.ipa Payload

      - name: Upload iOS Physical Device IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-device-ipa
          path: build/ios/iphoneos/Runner.ipa
